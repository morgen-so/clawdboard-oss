name: Check model pricing drift

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 9:00 UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  check-pricing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check pricing against litellm
        id: check
        run: |
          node scripts/check-pricing.mjs | tee /tmp/pricing-check.log
          # Extract the machine-readable summary block for the PR body
          awk '/=== PRICING_CHECK_SUMMARY ===/{flag=1; next} /=== END_PRICING_CHECK_SUMMARY ===/{flag=0} flag' \
            /tmp/pricing-check.log > /tmp/pricing-summary.json
          cat /tmp/pricing-summary.json

      - name: Create PR if pricing changed
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git diff --name-only -- cli/src/pricing.ts)" ]; then
            echo "No pricing changes detected in cli/src/pricing.ts."
            exit 0
          fi

          BRANCH="chore/pricing-update-$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add cli/src/pricing.ts
          git commit -m "$(cat <<'EOF'
          chore: update model pricing table

          Automated pricing drift detected by weekly check against litellm.
          Review the changes carefully before merging.
          EOF
          )"
          git push origin "$BRANCH"

          # Build the manual-review checklist from the summary JSON
          LITELLM_SHA=$(jq -r .litellmSha /tmp/pricing-summary.json)
          MANUAL_LIST=$(jq -r '.manual[] | "- [ ] `" + . + "`"' /tmp/pricing-summary.json)
          MANUAL_COUNT=$(jq -r '.manual | length' /tmp/pricing-summary.json)
          VERIFIED=$(jq -r .verified /tmp/pricing-summary.json)
          TABLE_SIZE=$(jq -r .tableSize /tmp/pricing-summary.json)

          gh pr create \
            --title "chore: update model pricing table" \
            --body "$(cat <<EOF
          ## Automated pricing update

          The weekly pricing check detected differences between our hardcoded
          pricing table and [litellm's published rates](https://github.com/BerriAI/litellm/blob/${LITELLM_SHA}/model_prices_and_context_window.json).

          **Coverage:** ${VERIFIED}/${TABLE_SIZE} auto-verified against litellm, ${MANUAL_COUNT} manually maintained.

          ### Auto-verified review
          - [ ] Spot-check Anthropic rates against https://platform.claude.com/docs/en/about-claude/pricing
          - [ ] Spot-check OpenAI rates against https://platform.openai.com/docs/pricing
          - [ ] Spot-check Google rates against https://ai.google.dev/gemini-api/docs/pricing

          ### Manual review required (${MANUAL_COUNT} models not in litellm)
          ${MANUAL_LIST}

          ### Pinned source
          - [ ] Consider bumping \`LITELLM_SHA\` in \`scripts/check-pricing.mjs\` (current: \`${LITELLM_SHA:0:7}\`) — quarterly is fine.

          Generated by the [weekly pricing check workflow](../actions/workflows/pricing-check.yml).
          EOF
          )"
